<div class="page-header">
  <div class="header-info">
    <h1>Categorias</h1>
    <p>Gerencie as categorias de produtos do sistema</p>
  </div>
  <button class="btn btn-primary" (click)="abrirModal()">
    <span class="material-symbols-outlined">add</span>
    Nova Categoria
  </button>
</div>

<div class="card">
  <div class="table-container">
    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Descrição</th>
          <th class="text-right">Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cat of categorias">
          <td>#{{ cat.id }}</td>
          <td><strong>{{ cat.nome }}</strong></td>
          <td>{{ cat.descricao || 'Sem descrição' }}</td>
          <td>
            <div class="action-buttons">
              <button class="btn-icon-sm" (click)="abrirModal(cat)" title="Editar">
                <span class="material-symbols-outlined">edit</span>
              </button>
              <button class="btn-icon-sm delete" (click)="excluirCategoria(cat.id)" title="Excluir">
                <span class="material-symbols-outlined">delete</span>
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="categorias.length === 0 && !loading">
          <td colspan="4" class="text-center" style="padding: 3rem; color: var(--color-text-secondary);">
            Nenhuma categoria cadastrada.
          </td>
        </tr>
        <tr *ngIf="loading">
          <td colspan="4" class="text-center" style="padding: 2rem;">
            Carregando...
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal de Cadastro/Edição -->
<div class="modal-overlay" *ngIf="showModal" (click)="fecharModal()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ editingCategoria ? 'Editar Categoria' : 'Nova Categoria' }}</h2>
      <button class="btn-icon-sm" (click)="fecharModal()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    
    <div class="modal-body">
      <div class="grid-form">
        <div class="form-group col-12">
          <label class="form-label">Nome da Categoria</label>
          <input type="text" class="form-control" [(ngModel)]="categoriaForm.nome" placeholder="Ex: Bebidas, Mercearia...">
        </div>
        
        <div class="form-group col-12">
          <label class="form-label">Descrição</label>
          <textarea class="form-control" [(ngModel)]="categoriaForm.descricao" rows="3" placeholder="Opcional..."></textarea>
        </div>
      </div>
    </div>
    
    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" (click)="salvarCategoria()" [disabled]="!categoriaForm.nome">
        {{ editingCategoria ? 'Atualizar' : 'Salvar' }}
      </button>
    </div>
  </div>
</div>
