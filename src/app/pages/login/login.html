<div class="login-card">
  <div class="login-header" style="text-align: center; margin-bottom: 2rem;">
    <img src="/logo.png" alt="FluxPDV" style="width: 100px; margin-bottom: 1rem;">
    <h2 style="margin: 0; color: var(--color-primary-dark); font-weight: 800;">FluxPDV</h2>
    <p style="margin-top: 0.5rem; color: var(--color-text-secondary);">Gestão e Ponto de Venda</p>
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
    
    <div *ngIf="errorMessage" class="form-error-msg" style="margin-bottom: 1rem; font-size: 0.875rem; text-align: center;">
      {{ errorMessage }}
    </div>

    <div class="form-group">
      <label for="email" class="form-label">E-mail ou Usuário</label>
      <input 
        id="email" 
        type="email" 
        class="form-control" 
        formControlName="email" 
        placeholder="exemplo@empresa.com.br"
        [class.is-invalid]="isSubmitted && loginForm.get('email')?.invalid"
      >
      <div *ngIf="isSubmitted && loginForm.get('email')?.hasError('required')" class="form-error-msg">
        O e-mail é obrigatório.
      </div>
      <div *ngIf="isSubmitted && loginForm.get('email')?.hasError('email')" class="form-error-msg">
        Digite um e-mail válido.
      </div>
    </div>

    <div class="form-group">
      <label for="password" class="form-label">Senha</label>
      <input 
        id="password" 
        type="password" 
        class="form-control" 
        formControlName="password" 
        placeholder="••••••••"
        [class.is-invalid]="isSubmitted && loginForm.get('password')?.invalid"
      >
      <div *ngIf="isSubmitted && loginForm.get('password')?.hasError('required')" class="form-error-msg">
        A senha é obrigatória.
      </div>
      <div *ngIf="isSubmitted && loginForm.get('password')?.hasError('minlength')" class="form-error-msg">
        A senha deve ter pelo menos 6 caracteres.
      </div>
    </div>

    <div class="form-actions">
      <a href="#" class="forgot-password">Esqueceu a senha?</a>
    </div>

    <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading">
      <span class="material-symbols-outlined" *ngIf="!isLoading">login</span>
      <span class="material-symbols-outlined spinning" *ngIf="isLoading">progress_activity</span>
      {{ isLoading ? 'Entrando...' : 'Entrar' }}
    </button>
  </form>
</div>
